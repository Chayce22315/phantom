  deploymentTarget:
    iOS: "16.0"
settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  PHANTOM:
    type: application
    platform: iOS
    sources:
      - PHANTOM
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.phantom.os
      PRODUCT_NAME: PHANTOM
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_FILE: PHANTOM/Info.plist
      CODE_SIGN_STYLE: Manual
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
